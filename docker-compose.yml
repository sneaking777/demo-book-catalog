services:
  app:
    build:
      context: ./docker/php
      args:
        UID: '1000'
        GID: '1000'
    working_dir: /var/www/html
    expose:
      - '9000'
    volumes:
      - ./:/var/www/html:delegated
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: book_catalog
      DB_USER: book_catalog
      DB_PASSWORD: book_catalog
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.28-alpine
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: book_catalog
      MYSQL_USER: book_catalog
      MYSQL_PASSWORD: book_catalog
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db-data:
